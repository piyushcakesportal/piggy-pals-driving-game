name: Build Signed Piggy Pals Bundle

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Restore signing key
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > "$RUNNER_TEMP/piggy-pals-upload-key.jks"

      - name: Build signed release bundle
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/piggy-pals-upload-key.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle bundleRelease

      - name: Upload signed Play Store bundle
        uses: actions/upload-artifact@v4
        with:
          name: piggy-pals-signed-play-bundle
          path: app/build/outputs/bundle/release/app-release.aab
